service: aws-python-flask-api

frameworkVersion: "4"

custom:
  wsgi:
    app: app.app
    packRequirements: false

provider:
  name: aws
  runtime: python3.12

plugins:
  - serverless-wsgi
  - serverless-python-requirements

package:
  individually: true

functions:
  api:
    handler: wsgi_handler.handler
    events:
      - http:
          path: /
          method: ANY
      - http:
          path: /{proxy+}
          method: ANY

